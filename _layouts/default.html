<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
  </head>
  <body>
    <div class="wrapper">
      <header>
        <h1><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
        <p>{{ site.description }}</p>

        <hr style="border: 0; border-top: 1px solid #eee; margin: 1.5rem 0;">

        <!-- Clean Sidebar Navigation -->
        <nav style="display: flex; flex-direction: column; gap: 0.5rem; font-weight: bold;">
          <a href="{{ '/' | relative_url }}">Home</a>
          <a href="{{ '/projects.html' | relative_url }}">Technical Showcase</a>
          <a href="{{ '/career.html' | relative_url }}">Career & Experience</a>
          <a href="{{ '/contact.html' | relative_url }}">Secure Contact</a>
        </nav>

        <hr style="border: 0; border-top: 1px solid #eee; margin: 1.5rem 0;">

        <p class="view"><a href="https://github.com/jyothisthaliath" target="_blank" rel="noopener noreferrer">View My GitHub Profile</a></p>
      </header>
      
      <section>
        {{ content }}
      </section>
    </div>
    <script src="{{ '/assets/js/scale.fix.js' | relative_url }}"></script>
  </body>
</html>
